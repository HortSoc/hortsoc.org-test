                    readonly: true
                    hidden: true
                  - name: source_type
                    label: Source Type
                    type: string
                    readonly: true
                    hidden: true
                  - name: gallery_type
                    label: Gallery Type
                    type: string
                    readonly: true
                    required: false
                    hidden: true
                  - name: source_block_index
                    label: Source Block Index
                    type: number
                    readonly: true
                    required: false
                    hidden: true
                  - name: notes
                    label: Internal Notes
                    type: text
                    readonly: true
                    hidden: true
              - name: slug
                label: Slug
                type: string
                readonly: true
                hidden: true
              - name: source_url
                label: Source URL
                type: string
                readonly: true
                hidden: true
              - name: notes
                label: Internal Notes
                type: text
                readonly: true
                hidden: true
          - name: annual_show_2023_gallery
            label: Annual Show 2023
            type: file
            path: src/content/gallery-events/annual-show-2023.json
            format: json
            fields: *gallery_event_fields
          - name: annual_show_2022_gallery
            label: Annual Show 2022
            type: file
            path: src/content/gallery-events/annual-show-2022.json
