        format: json
        fields:
          - name: primaryNavigation
            label: Primary Navigation
            type: object
            list: true
            fields:
              - name: label
                label: Label
                type: string
              - name: href
                label: Link
                type: string
              - name: children
                label: Children
                type: object
                list: true
                required: false
                fields:
                  - name: label
                    label: Label
                    type: string
                  - name: href
                    label: Link
                    type: string
          - name: footerNavigation
            label: Footer Navigation
            type: object
            list: true
            fields:
              - name: label
                label: Label
                type: string
              - name: href
                label: Link
                type: string
          - name: footerFindUs
            label: Find Us
            type: object
            fields:
              - name: title
                label: Title
                type: string
              - name: map
                label: Map
                type: object
                fields:
                  - name: embed_url
                    label: Embed URL
                    type: string
                  - name: title
                    label: Title
                    type: string
              - name: address
                label: Address
                type: object
                fields:
                  - name: label
                    label: Label
                    type: string
                  - name: href
                    label: Link
                    type: string
                  - name: external
                    label: External Link
                    type: boolean
          - name: footerMiddleSections
            label: Footer Sections
            type: object
            list: true
            fields:
              - name: title
                label: Title
                type: string
              - name: items
                label: Links
                type: object
                list: true
                fields:
                  - name: label
                    label: Label
                    type: string
                  - name: href
                    label: Link
                    type: string
                  - name: external
                    label: External Link
                    type: boolean
          - name: footerSearch
            label: Footer Search
            type: object
            fields:
              - name: title
                label: Title
                type: string
              - name: action
                label: Action
                type: string
              - name: field_name
                label: Query Field Name
                type: string
              - name: placeholder
                label: Placeholder
                type: string
              - name: button_label
                label: Button Label
                type: string

  - name: blog_categories
    label: Blog Categories
    type: collection
    path: src/content/blog-categories
    filename: "{primary}.md"
    format: yaml-frontmatter
    view:
      fields: [label, name]
      primary: label
      sort: [label]
      default:
        sort: label
        order: asc
    fields:
      - name: label
        label: Display Name
        type: string
      - name: name
        label: Stored Value
        type: string
      - name: description
        label: Description
        type: text
        required: false

  - name: blog_posts
    label: Blog Posts
    type: collection
    path: src/content/pages
    filename: "{primary}.md"
    format: yaml-frontmatter
    exclude:
      - home.md
      - about.md
      - annual-show.md
      - blog.md
      - contacts.md
      - gallery.md
      - gallery-annual-show-2024.md
      - gallery-annual-show-2023.md
      - gallery-annual-show-2022.md
      - gallery-annual-show-2021.md
      - gallery-plant-sale-2021.md
      - membership.md
      - thing-one.md
      - schools-liaison.md
      - testimonial-872.md
      - ruth-rooley-chairman.md
      - tree-planting.md
      - whats-on.md
      - whoswho.md
      - winners-2021.md
    view:
      fields: [title, date, categories]
      primary: title
      sort: [date, title]
      default:
        sort: date
        order: desc
    fields:
      - name: title
        label: Title
        type: string
      - name: date
        label: Date
        type: date
        options:
          time: true
          format: "yyyy-MM-dd'T'HH:mm:ss'Z'"
      - name: categories
        label: Categories
        type: reference
        options:
          collection: blog_categories
          multiple: true
          search: label,name
          value: "{name}"
          label: "{label}"
      - name: excerpt
        label: Excerpt
        type: text
      - name: featuredImage
        label: Featured Image
        type: object
        required: false
        fields:
          - name: src
            label: Image
            type: image
            required: false
            options:
              media: blog_images
          - name: alt
            label: Alt Text
            type: string
            required: false
      - name: body
        label: Body
        type: rich-text
        options:
          format: markdown
          media: uploads
          path: blog

