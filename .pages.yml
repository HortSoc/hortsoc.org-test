media:
  - name: site_images
    label: Site Images
    input: public/media/site
    output: /media/site
    categories: [image]
  - name: blog_images
    label: Blog Images
    input: public/media/blog
    output: /media/blog
    categories: [image]
  - name: gallery_images
    label: Gallery Images
    input: public/media/galleries
    output: /media/galleries
    categories: [image]
  - name: documents
    label: Documents
    input: public/media/documents
    output: /media/documents
    categories: [document]
  - name: uploads
    label: Shared Uploads
    input: public/media/uploads
    output: /media/uploads

settings:
  hide: true
  content:
    merge: true

content:
  - name: pages
    label: Pages
    type: group
    items:
      - name: homepage
        label: Homepage
        type: group
        items:
          - name: home_page_copy
            label: Intro Copy
            type: file
            path: src/content/pages/home.md
            format: yaml-frontmatter
            fields:
              - name: title
                label: Title
                type: string
              - name: path
                label: Public URL
                type: string
                readonly: true
                required: false
              - name: body
                label: Body
                type: rich-text
                options:
                  format: markdown
                  media: uploads
                  path: pages
          - name: homepage_content
            label: Sections
            type: file
            path: src/content/site-assets.json
            format: json
            fields:
              - name: siteAssetPlan
                label: Homepage
                type: object
                fields:
                  - name: home_hero
                    label: Hero
                    type: object
                    fields:
                      - name: current_path
                        label: Image
                        type: image
                        options:
                          media: site_images
                          path: heroes/home
                      - name: alt
                        label: Alt Text
                        type: string
                  - name: home_feature_cards
                    label: Feature Cards
                    type: object
                    list: true
                    fields:
                      - name: title
                        label: Title
                        type: string
                      - name: href
                        label: Link
                        type: string
                      - name: summary
                        label: Summary
                        type: text
                      - name: image
                        label: Image
                        type: object
                        fields:
                          - name: current_path
                            label: Image
                            type: image
                            options:
                              media: site_images
                              path: home/cards
                          - name: alt
                            label: Alt Text
                            type: string
                  - name: home_spotlight
                    label: Spotlight
                    type: object
                    fields:
                      - name: title
                        label: Title
                        type: string
                      - name: image
                        label: Image
                        type: object
                        fields:
                          - name: current_path
                            label: Image
                            type: image
                            options:
                              media: site_images
                              path: home/spotlight
                          - name: alt
                            label: Alt Text
                            type: string
                  - name: home_notice
                    label: Notice
                    type: object
                    fields:
                      - name: title
                        label: Title
                        type: string
                      - name: body
                        label: Body
                        type: text
                  - name: home_poster
                    label: Poster
                    type: object
                    fields:
                      - name: current_path
                        label: Image
                        type: image
                        options:
                          media: site_images
                          path: home/posters
                      - name: alt
                        label: Alt Text
                        type: string
      - name: annual_show
        label: Annual Show
        type: file
        path: src/content/pages/annual-show.md
        format: yaml-frontmatter
        fields:
          - name: title
            label: Title
            type: string
          - name: status
            label: Status
            type: select
            required: false
            options:
              values:
                - value: draft
                  label: Draft
                - value: published
                  label: Published
          - name: path
            label: Public URL
            type: string
            readonly: true
            required: false
          - name: annual_show
            label: Annual Show Details
            type: object
            fields:
              - name: date_text
                label: Show Date
                type: string
              - name: theme
                label: Theme
                type: string
              - name: gallery_notice
                label: Gallery Notice
                type: string
                required: false
              - name: gallery_url
                label: Gallery Link
                type: string
                required: false
              - name: competition
                label: Competition Documents
                type: object
                fields:
                  - name: heading
                    label: Section Heading
                    type: string
                  - name: schedule
                    label: Show Schedule
                    type: object
                    fields:
                      - name: year
                        label: Display Year
                        type: string
                      - name: label
                        label: Link Label
                        type: string
                      - name: file
                        label: PDF
                        type: file
                        options:
                          media: documents
                          path: annual-show
                          extensions: [pdf]
                      - name: note
                        label: Note After Link
                        type: string
                        required: false
                  - name: entry_form
                    label: Entry Form
                    type: object
                    fields:
                      - name: year
                        label: Display Year
                        type: string
                      - name: label
                        label: Link Label
                        type: string
                      - name: url
                        label: Form URL
                        type: string
                      - name: note
                        label: Note After Link
                        type: string
                        required: false
                  - name: notes_for_exhibitors
                    label: Notes for Exhibitors
                    type: object
                    fields:
                      - name: label
                        label: Link Label
                        type: string
                      - name: file
                        label: PDF
                        type: file
                        options:
                          media: documents
                          path: annual-show
                          extensions: [pdf]
              - name: stallholders
                label: Stallholders
                type: object
                fields:
                  - name: heading
                    label: Section Heading
                    type: string
                  - name: intro
                    label: Intro
                    type: text
                  - name: phone
                    label: Phone
                    type: string
                    required: false
                  - name: email
                    label: Email
                    type: string
                    required: false
                  - name: letter
                    label: Stallholders Letter
                    type: object
                    fields:
                      - name: year
                        label: Display Year
                        type: string
                      - name: label
                        label: Link Label
                        type: string
                      - name: file
                        label: PDF
                        type: file
                        options:
                          media: documents
                          path: annual-show
                          extensions: [pdf]
                  - name: application
                    label: Stallholders Application
                    type: object
                    fields:
                      - name: year
                        label: Display Year
                        type: string
                      - name: label
                        label: Link Label
                        type: string
                      - name: url
                        label: Form URL
                        type: string
          - name: body
            label: Additional Copy
            type: rich-text
            required: false
            options:
              format: markdown
              media: uploads
              path: pages
      - name: ordinary_pages
        label: Ordinary Pages
        type: collection
        path: src/content/pages
        filename: "{primary}.md"
        format: yaml-frontmatter
        exclude:
          - home.md
          - annual-show.md
          - blog.md
          - gallery.md
          - gallery-annual-show-2024.md
          - gallery-annual-show-2023.md
          - gallery-annual-show-2022.md
          - gallery-annual-show-2021.md
          - gallery-plant-sale-2021.md
          - thing-one.md
          - testimonial-872.md
          - ruth-rooley-chairman.md
          - summer-newsletter.md
          - little-green-fingers.md
          - from-the-pumpkin-patch.md
          - metaldehyde-slug-pellets-banned.md
          - queen-award-for-voluntary-service.md
          - april-seasonal-tips.md
        view:
          fields: [title, status]
          primary: title
          sort: [title]
          default:
            sort: title
            order: asc
        fields:
          - name: title
            label: Title
            type: string
          - name: status
            label: Status
            type: select
            required: false
            options:
              values:
                - value: draft
                  label: Draft
                - value: published
                  label: Published
          - name: path
            label: Public URL
            type: string
            readonly: true
            required: false
          - name: body
            label: Body
            type: rich-text
            options:
              format: markdown
              media: uploads
              path: pages
      - name: blog_landing_page
        label: Blog Landing Page
        type: file
        path: src/content/pages/blog.md
        format: yaml-frontmatter
        fields:
          - name: title
            label: Title
            type: string
          - name: path
            label: Public URL
            type: string
            readonly: true
            required: false
          - name: body
            label: Body
            type: rich-text
            options:
              format: markdown
              media: uploads
              path: blog

  - name: site_structure
    label: Site Structure
    type: group
    items:
      - name: site_navigation
        label: Navigation
