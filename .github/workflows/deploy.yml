name: Publish to gh-pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Publish dist to gh-pages
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          set -eu

          publish_dir="$(mktemp -d)"
          trap 'rm -rf "$publish_dir"' EXIT

          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages
            git worktree add "$publish_dir" origin/gh-pages
            git -C "$publish_dir" checkout -B gh-pages origin/gh-pages
          else
            git worktree add -B gh-pages "$publish_dir"
          fi

          find "$publish_dir" -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R dist/. "$publish_dir"/
          touch "$publish_dir/.nojekyll"

          git -C "$publish_dir" add --all

          if git -C "$publish_dir" diff --cached --quiet; then
            echo "No changes to publish."
            exit 0
          fi

          git -C "$publish_dir" commit -m "Publish ${GITHUB_SHA}"
          git -C "$publish_dir" push origin HEAD:gh-pages
